name: Auto-merge PRs
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "contributors/**" # <- only run if only contributors dir changed

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Get a list of files changed in the pull request
        run: |
          PR_FILES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" | \
            jq -r '.[].filename')
          FILES_CHANGED=$(echo $PR_FILES | tr '\n' ' ')
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_ENV

      - name: Check if PR modifies only contributors/{username}.html
        id: only_contributors_check
        uses: actions/github-script@v6
        with:
          script: |
            const username = context.payload.pull_request.user.login;
            const expected = `contributors/${username}.html`;
            const filesChanged = process.env.files_changed.trim();
            console.log(`Comparing "${filesChanged}" to "${expected}"`);
            const onlyContributors = filesChanged === expected;
            core.setOutput('only_contributors', onlyContributors);

      - name: Echo value of steps.only_contributors_check.outputs.only_contributors
        run: echo ${{ steps.only_contributors_check.outputs.only_contributors }}

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install bs4 groq

      - name: Run toxicity check
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/check_toxicity.py

      - name: Auto-approve PR if valid for auto-approve
        if: success() && steps.only_contributors_check.outputs.only_contributors == 'true'
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create comment if valid for auto-approve
        if: success() && steps.only_contributors_check.outputs.only_contributors == 'true'
        run: echo "👏 You've successfully submitted a PR! Congratulations!" | tee comment.txt

      - name: Create comment if offensive content is detected
        if: failure()
        run: echo "🚨 Offensive content detected. Please review your PR." | tee comment.txt

      - name: Create comment if something other than contributors/{username}.html was modified
        if: success() && steps.only_contributors_check.outputs.only_contributors != 'true'
        run: echo "👏 You've successfully submitted a PR! Note that it contains changes that require review.\nFiles changed:\n$FILES_CHANGED" | tee comment.txt

      - name: Post comment on PR
        if: always()
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: comment.txt
